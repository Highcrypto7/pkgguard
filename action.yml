name: pkgguard
description: Vet AI-recommended packages for hallucinations, typosquats, malware signals, license traps, dead repos and fake stars.
author: pkgguard
branding:
  icon: shield
  color: purple

inputs:
  files:
    description: Files and/or names to vet (space-separated). Defaults to requirements.txt.
    required: false
    default: requirements.txt
  fail-on:
    description: "Fail the job when the worst verdict reaches: danger | warn | never"
    required: false
    default: danger
  args:
    description: Extra arguments passed through to pkgguard (e.g. --deep).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        python -m pip install --quiet "${{ github.action_path }}"
        pkgguard ${{ inputs.files }} --fail-on "${{ inputs.fail-on }}" ${{ inputs.args }}
      env:
        # Raises the GitHub API rate limit for repo metadata lookups.
        GITHUB_TOKEN: ${{ github.token }}

name: publish

# Publishes to PyPI when you create a GitHub Release.
# Uses PyPI Trusted Publishing (OIDC) — no API token stored anywhere.
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/):
#   PyPI project name:  pkgguard-cli
#   Owner:              Highcrypto7
#   Repository:         pkgguard
#   Workflow filename:  publish.yml
#   Environment:        pypi
# Then: create a GitHub Release (tag v0.1.0) and this runs automatically.

on:
  release:
    types: [published]

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
